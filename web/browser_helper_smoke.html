<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VRAM Browser Helper Smoke Test</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Georgia, "Iowan Old Style", serif;
      background: linear-gradient(135deg, #f6efe4, #dfe8df);
      color: #182018;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      background: rgba(255, 252, 247, 0.92);
      border: 1px solid rgba(24, 32, 24, 0.12);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(24, 32, 24, 0.12);
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: #1e5c46;
      color: #f7f4ef;
      font: inherit;
      cursor: pointer;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #182018;
      color: #e9f3ea;
      padding: 16px;
      border-radius: 14px;
      min-height: 200px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>VRAM Browser Helper Smoke Test</h1>
    <p>This page fetches the local Gemma fixture, mounts it into the wasm filesystem as a browser File, and runs <code>fit.execute_in_process</code>.</p>
    <button id="run-button" type="button">Run Smoke Test</button>
    <pre id="output">Idle</pre>
  </main>

  <script src="../build-wasm-vendor/vram_predictor_wasm.js"></script>
  <script type="module">
    import { createBrowserPredictorClient } from './vram_predictor_browser.js';

    const output = document.getElementById('output');
    const button = document.getElementById('run-button');

    function formatError(error) {
      if (error && typeof error === 'object') {
        if (typeof error.stack === 'string' && error.stack.length > 0) {
          return error.stack;
        }

        try {
          return JSON.stringify(error, null, 2);
        } catch (_) {
        }
      }

      return String(error);
    }

    async function runSmokeTest() {
      output.textContent = 'Loading wasm module...';

      const client = await createBrowserPredictorClient({
        moduleFactory: globalThis.createVRAMPredictorModule,
        moduleOptions: {
          locateFile: (path) => `../build-wasm-vendor/${path}`,
        },
      });

      output.textContent = 'Fetching fixture...';
      const fixtureResponse = await fetch('../.fixtures/gemma-3-270m-Q8_0.gguf');
      if (!fixtureResponse.ok) {
        throw new Error(`fixture fetch failed: ${fixtureResponse.status}`);
      }

      const blob = await fixtureResponse.blob();
      const file = new File([blob], 'gemma-3-270m-Q8_0.gguf', { type: 'application/octet-stream' });
      const virtualPath = await client.mountBrowserFile(file);

      output.textContent = 'Running fit.execute_in_process...';
      const result = client.predictMountedFit({
        modelPath: virtualPath,
        hostRamBytes: 32 * 1024 * 1024 * 1024,
        fitTargetMiB: [512],
        targetFreeMiB: [2048],
        gpus: [
          {
            id: 'gpu0',
            free_bytes: 4 * 1024 * 1024 * 1024,
            total_bytes: 8 * 1024 * 1024 * 1024,
          },
        ],
        nCtx: 4096,
        minCtx: 1024,
      });

      globalThis.__VRAM_SMOKE_RESULT__ = result;
      output.textContent = JSON.stringify(result, null, 2);
      return result;
    }

    button.addEventListener('click', () => {
      runSmokeTest().catch((error) => {
        const formatted = formatError(error);
        output.textContent = formatted;
        globalThis.__VRAM_SMOKE_ERROR__ = formatted;
      });
    });
  </script>
</body>
</html>
